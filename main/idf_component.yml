## IDF Component Manager Manifest File
##
## NOTE: For ESP-IDF v6.0 compatibility, some components have been patched and
##       placed in the local 'components/' directory. The build system will
##       automatically use local components over these managed dependencies.
##       See components/README.md for details on the patches.
##
dependencies:
  idf: '>=5.5.3'
  lvgl/lvgl:
    version: '>=9.5.0'
    public: true

  # Note: esp_lvgl_port has a patched version in components/esp_lvgl_port for v6.0
  espressif/esp_lvgl_port:
    public: true
    version: "*"

  espressif/esp_lcd_touch_ft5x06: ^1.1.0
  espressif/esp_lcd_touch_gt911: ^1.2.0

  esp_lcd_ek79007:
    version: "^1.0.0"
    rules:
      - if: '$LCD_TYPE == "amelin_ek79007"'
      
  espressif/esp_lcd_ili9881c:
    version: "^1.0.2"
    rules:
      - if: '$LCD_TYPE == "espressif_ili9881c"'

  # Note: esp_lcd_dsi has a patched version in components/esp_lcd_dsi for v6.0
  waveshare/esp_lcd_dsi:
    version: "*"
    rules:
      - if: '$LCD_TYPE == "waveshare_ili9881c"'

  waveshare/esp_lcd_ili9881c:
    version: "*"
    rules:
      - if: '$LCD_TYPE == "waveshare_ili9881c"'

  chmorgan/esp-file-iterator:
    version: 1.0.0
    public: true

  # cfscn/esp_lcd_touch_ft6x36: ^1.0.8
